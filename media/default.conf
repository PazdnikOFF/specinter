server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    sendfile on;
    tcp_nopush on;

    # Имена файлов контентно-адресные (не меняются) → кэшируем максимально.
    # Возврат на страницу берёт картинки из кэша браузера, без перезапроса.
    location / {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Миниатюры для сеток/плиток каталога: /thumbs/<файл>.
    # Если миниатюры ещё нет — отдаём оригинал (fallback), без 404.
    location /thumbs/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri @original;
    }
    location @original {
        rewrite ^/thumbs/(.*)$ /$1 break;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
